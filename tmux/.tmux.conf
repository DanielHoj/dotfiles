# =====================================================
#   VI MODE & COPY SETTINGS
# =====================================================
setw -g mode-keys vi

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# Mouse drag to copy
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# =====================================================
#   PLUGINS
# =====================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'Nybkox/tmux-ukiyo'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'

# =====================================================
#   THEME & APPEARANCE
# =====================================================
set -g @ukiyo-theme 'kanagawa/wave'

# Move status bar to top
set-option -g status-position top

# Configure plugins: git, network, time, battery
set -g @ukiyo-plugins "git network time battery"

# Enable powerline for better aesthetics
set -g @ukiyo-show-powerline true
set -g @ukiyo-show-flags true

# Fix status bar width for proper alignment
set -g status-left-length 100
set -g status-right-length 100

# Show current command in pane border
set -g pane-border-status top
set -g pane-border-format "#{pane_index} #{pane_current_command}"

# =====================================================
#   TERMINAL & COLOR SETTINGS
# =====================================================
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides ",xterm-256color:RGB"

# Better nvim integration
set -g focus-events on
set -sg escape-time 0

# =====================================================
#   UKIYO PLUGIN SETTINGS
# =====================================================
# Time format
set -g @ukiyo-show-timezone false
set -g @ukiyo-military-time true

# Git configuration
set -g @ukiyo-git-disable-status false
set -g @ukiyo-git-show-current-symbol ✓
set -g @ukiyo-git-show-diff-symbol !

# Network settings
set -g @ukiyo-network-bandwidth eth0
set -g @ukiyo-network-bandwidth-interval 0
set -g @ukiyo-network-bandwidth-show-interface true

# Battery settings  
set -g @ukiyo-battery-label "BAT"
set -g @ukiyo-show-battery true

# =====================================================
#   PERSISTENCE SETTINGS
# =====================================================
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'

# =====================================================
#   MOUSE SUPPORT
# =====================================================
set -g mouse on

# =====================================================
#   PRODUCTIVITY KEYBINDINGS
# =====================================================

# Better splits (opens in same directory)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Quick pane navigation (Alt+hjkl without prefix!)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Quick window switching (Alt+number)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# Resize panes with prefix + hjkl
bind h resize-pane -L 5
bind j resize-pane -D 5
bind k resize-pane -U 5
bind l resize-pane -R 5

# Swap panes easily
bind > swap-pane -D
bind < swap-pane -U

# Synchronize panes (send same commands to all panes)
bind S setw synchronize-panes

# Quick reload
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Kill session/window without confirmation
bind X confirm-before -p "kill-session #S? (y/n)" kill-session
bind x kill-pane

# Break pane to new window
bind b break-pane -d

# Last session
bind L switch-client -l

# Layouts
bind M-1 select-layout even-horizontal
bind M-2 select-layout even-vertical
bind M-3 select-layout main-horizontal
bind M-4 select-layout main-vertical
bind M-5 select-layout tiled

# =====================================================
#   PRESET LAYOUTS
# =====================================================

# Dev layout: editor (70%) + terminal (30%)
bind D split-window -h -p 30 -c "#{pane_current_path}" \; \
  select-pane -L

# Test layout: code + tests + logs
bind T split-window -h -p 50 -c "#{pane_current_path}" \; \
  split-window -v -p 50 -c "#{pane_current_path}" \; \
  select-pane -L

# Monitor layout: 4-way split
bind M split-window -h -c "#{pane_current_path}" \; \
  split-window -v -c "#{pane_current_path}" \; \
  select-pane -L \; \
  split-window -v -c "#{pane_current_path}" \; \
  select-layout tiled

# =====================================================
#   POPUP KEYBINDINGS
# =====================================================

# Open lazygit in popup
bind g display-popup -E -w 95% -h 95% "lazygit"

# Open btop/htop in popup
bind H display-popup -E -w 95% -h 95% "btop || htop"

# Open a terminal in popup
bind t display-popup -E -w 80% -h 80%

# =====================================================
#   SESH - SESSION MANAGER
# =====================================================
bind-key "s" run-shell "sesh connect \"$(
    sesh list | fzf-tmux -p 55%,60% \
        --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
        --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
        --bind 'tab:down,btab:up' \
        --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list)' \
        --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t)' \
        --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c)' \
        --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z)' \
        --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
        --bind 'ctrl-d:execute(tmux kill-session -t {})+change-prompt(⚡  )+reload(sesh list)'
)\""

# =====================================================
#   INITIALIZE TPM (keep at bottom)
# =====================================================
run '~/.tmux/plugins/tpm/tpm'
